name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y iverilog gtkwave
      - name: Run native simulation
        run: make test
      - name: Upload waveform
        uses: actions/upload-artifact@v4
        with:
          name: waveform
          path: atm_waves.vcd
